<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="wand-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f5ff"/>
      <stop offset="100%" style="stop-color:#0080ff"/>
    </linearGradient>
    <linearGradient id="wand-yellow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#ffa500"/>
    </linearGradient>
    <filter id="glow-blue">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- 蓝色魔法棒主体 -->
  <path d="M4 4 L4 20 L10 14 L14 22 L18 20 L14 12 L22 12 Z" fill="url(#wand-blue)" filter="url(#glow-blue)"/>
  <!-- 黄色头部光点 -->
  <circle cx="4" cy="4" r="4" fill="url(#wand-yellow)" filter="url(#glow-blue)"/>
  <circle cx="4" cy="4" r="2" fill="#fff" opacity="0.8"/>
</svg>
